<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Consumo por Setor</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body>
  <nav class="navbar navbar-dark bg-dark sticky-top">
    <div class="container-fluid">
      <a href="/" class="btn btn-outline-light me-3"><i class="bi bi-arrow-left me-1"></i>Voltar</a>
      <span class="navbar-brand mb-0 h1">Consumo por Setor</span>
    </div>
  </nav>

  <div class="container-fluid py-4 px-4">
    <div class="card border-0 shadow-sm mb-3">
      <div class="card-body">
        <h5 id="titulo-setor" class="fw-semibold"></h5>
        <div class="text-muted small" id="periodo-info"></div>
      </div>
    </div>

    <div class="card border-0 shadow-sm mb-4">
      <div class="card-body">
        <canvas id="chart-setor" style="max-height:380px"></canvas>
      </div>
    </div>

    <div class="card border-0 shadow-sm">
      <div class="card-header"><h6 class="mb-0">Detalhe por Impressora</h6></div>
      <div class="card-body p-0">
        <div class="table-responsive">
          <table class="table mb-0">
            <thead class="table-light"><tr><th>Impressora</th><th>Modelo</th><th>Faces</th><th>Folhas</th><th>Resmas</th></tr></thead>
            <tbody id="tbody-setor"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <script src="js/consumo-setor.js"></script>
</body>
</html>
