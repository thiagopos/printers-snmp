<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Consumo por Impressora — Todos</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar navbar-dark bg-dark sticky-top">
    <div class="container-fluid">
      <a href="/" class="btn btn-outline-light me-3">
        <i class="bi bi-arrow-left me-1"></i>Voltar
      </a>
      <span class="navbar-brand mb-0 h1">
        <i class="bi bi-bar-chart-line-fill me-2"></i>Consumo por Impressora
        <span class="text-secondary fw-normal fs-6 ms-2" id="label-periodo"></span>
      </span>
    </div>
  </nav>

  <div class="container-fluid py-4 px-4">

    <!-- Controles de período -->
    <div class="card border-0 shadow-sm mb-4">
      <div class="card-body d-flex align-items-center gap-3 flex-wrap">
        <div class="btn-group btn-group-sm" role="group">
          <button class="btn btn-outline-secondary periodo-btn" data-periodo="semana">Semana</button>
          <button class="btn btn-outline-secondary periodo-btn" data-periodo="mes">Mês</button>
          <button class="btn btn-outline-secondary periodo-btn" data-periodo="total">Total</button>
        </div>
        <div class="d-flex align-items-center gap-1" id="bloco-intervalo">
          <input type="date" class="form-control form-control-sm" id="filtro-de"  style="width:145px">
          <span class="text-muted">até</span>
          <input type="date" class="form-control form-control-sm" id="filtro-ate" style="width:145px">
          <button class="btn btn-sm btn-primary" id="btn-aplicar-intervalo">
            <i class="bi bi-funnel-fill"></i>
          </button>
        </div>
        <span class="badge bg-secondary" id="badge-total-setores"></span>
      </div>
    </div>

    <!-- Gráfico de todos os setores -->
    <div class="card border-0 shadow-sm mb-4">
      <div class="card-header d-flex justify-content-between align-items-center">
        <h5 class="mb-0 fw-semibold">Páginas por Impressora</h5>
        <span class="text-muted small" id="subtitulo-chart"></span>
      </div>
      <div class="card-body">
        <div id="chart-wrapper">
          <canvas id="chart-setores"></canvas>
        </div>
      </div>
    </div>

    <!-- Tabela resumo -->
    <div class="card border-0 shadow-sm">
      <div class="card-header">
        <h6 class="mb-0 fw-semibold">Ranking completo</h6>
      </div>
      <div class="card-body p-0">
        <div class="table-responsive">
          <table class="table table-hover align-middle mb-0">
            <thead class="table-light">
              <tr>
                <th style="width:50px">#</th>
                <th>Impressora</th>
                <th>Setor</th>
                <th class="text-end">Páginas (faces)</th>
                <th class="text-end">Resmas (est.)</th>
              </tr>
            </thead>
            <tbody id="tbody-setores">
              <tr><td colspan="5" class="text-center py-5 text-muted">
                <div class="spinner-border spinner-border-sm me-2" role="status"></div>Carregando…
              </td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

  </div><!-- /container -->

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>
  <script>Chart.register(ChartDataLabels);</script>
  <script src="js/todos-setores.js"></script>
</body>
</html>
